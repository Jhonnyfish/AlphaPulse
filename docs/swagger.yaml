        in: query
        name: code
        required: true
        type: string
      - default: 10
        description: 返回条数
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取个股公告
      tags:
      - market
  /api/anomalies:
    get:
      description: 扫描 Alpha300 候选股中的市场异常(涨停/跌停/放量/大幅波动)
      produces:
