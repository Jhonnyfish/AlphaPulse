    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: AlphaPulse API
  version: "3.0"
paths:
  /analyze:
    get:
      consumes:
      - application/json
      description: 对指定股票进行8维度综合分析，支持批量分析(逗号分隔，最多10只)
      parameters:
      - description: 股票代码，多个用逗号分隔
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema: {}
      summary: 8维度综合分析
      tags:
      - analyze
  /api/activity-log:
    get:
      description: 返回最近50条活动日志
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 活动日志
      tags:
      - system
  /api/alerts:
    get:
      description: 获取自选股的智能预警信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AlertsResponse'
