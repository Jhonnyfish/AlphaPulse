        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: 使用邀请码注册新用户，返回 JWT token
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
