  /api/auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名密码登录获取 JWT token
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.loginRequest'
      produces:
